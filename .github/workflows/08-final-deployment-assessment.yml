name: 08 Final Deployment Assessment

on:
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app
  CONTAINER_NAME: tiny-health-container

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Tests
        run: python -m unittest discover -s tests -v

  prepare-output:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag-logic.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Tag
        id: tag-logic
        run: |
          TAG=$(date +%Y-%m-%d)-${{ github.run_id }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag-logic.outputs.tag }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag-logic.outputs.tag }}

  deploy-to-vm:
    needs: prepare-output
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-output.outputs.image_tag }}
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 8000:8000 \
              -e APP_VERSION="${{ needs.prepare-output.outputs.image_tag }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-output.outputs.image_tag }}
