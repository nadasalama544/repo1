name: 04 Deploy Workflow on Push

# Trigger: 
on:
  push:
    branches:
      - '**'   # 

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  APP_PORT: "8000"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout الكود
      - name: Check out repository
        uses: actions/checkout@v6

      # 2️⃣ Build Docker image من Dockerfile
      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_NAME}:latest" .

      # 3️⃣ Start container
      - name: Start container
        run: |
          docker run -d \
            --name tiny-health-container \
            -p "${APP_PORT}:${APP_PORT}" \
            "${IMAGE_NAME}:latest"

      # 4️⃣ Smoke test للتأكد أن التطبيق شغال
      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              echo "Smoke test passed ✅"
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "Smoke test failed ❌"
          exit 1

      # 5️⃣ Clean up: إزالة الـ container بعد الاختبار
      - name: Stop container
        if: always()
        run: docker rm -f tiny-health-container || true
