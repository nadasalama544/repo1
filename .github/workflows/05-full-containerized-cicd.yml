#name: 04 Deploy Workflow

# Trigger:build workflow
on:
  
  push:
    branches:
      - '**' 

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image
  APP_PORT: "8000"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Download the artifact from the build workflow
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: downloaded-image

      # 2️⃣ Load the Docker image from the artifact
      - name: Load Docker image
        run: docker load --input "downloaded-image/${IMAGE_TAR}"

      # 3️⃣ Start the container using the exact image from the build
      - name: Start container
        run: |
          docker run -d \
            --name tiny-health-container \
            -p "${APP_PORT}:${APP_PORT}" \
            "${IMAGE_NAME}:latest"

      # 4️⃣ Smoke test to ensure the deployed app is responding
      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              echo "Smoke test passed "
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "Smoke test failed "
          exit 1

      # 5️⃣ Clean up container after test
      - name: Stop container
        if: always()
        run: docker rm -f tiny-health-container || true
